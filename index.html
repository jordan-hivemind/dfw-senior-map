  clusters[cat] = L.markerClusterGroup({ maxClusterRadius: 50, spiderfyOnMaxZoom: true, showCoverageOnHover: false });
});
function buildPopup(f) {
  const rows = [];
  function row(k, v) { if (v == null || v === '' || v === undefined) return; rows.push(`<tr><td class="k">${escapeHtml(k)}</td><td>${v}</td></tr>`); }
  function plain(k, v) { if (v == null || v === '' || v === undefined) return; row(k, escapeHtml(v)); }
  function emailRow(k, v) { if (!v) return; row(k, `<a href="mailto:${escapeHtml(v)}">${escapeHtml(v)}</a>`); }
  function phoneRow(k, v) { if (!v) return; row(k, `<a href="tel:${escapeHtml(v)}">${escapeHtml(v)}</a>`); }
  function urlRow(k, v) { if (!v) return; row(k, `<a href="${escapeHtml(v)}" target="_blank" rel="noopener">link</a>`); }
  const colorMeta = COLORS[f.color_cat] || { color:'#666', label: 'Other' };
  const badge = `<span class="badge" style="background:${colorMeta.color}">${escapeHtml(colorMeta.label)}</span>`;
  let header = `<h4>${escapeHtml(f.name)}</h4>`;
  let meta = `<div class="meta">${badge}</div>`;
  if (f.tier === 1) {
    plain('Service Type', f.service_type); plain('Capacity', f.capacity); plain('Alz Capacity', f.alz_capacity);
    plain('Address', [f.address, f.city, 'TX', f.zip].filter(Boolean).join(', '));
    plain('County', f.county); phoneRow('Phone', f.phone); plain('Fax', f.fax);
    plain('Owner', f.owner); plain('Mgmt Co', f.mgmt); plain('Administrator', f.admin);
    emailRow('Provider Email', f.provider_email);
    plain('AD Title (likely)', f.ad_title_likely); plain('AD Name', f.ad_name);
    emailRow('AD Email', f.ad_email); phoneRow('AD Phone', f.ad_phone);
    plain('Outreach Status', f.outreach_status); plain('Linked Contact', f.linked_contact);
  } else if (f.tier === 2) {
    plain('Category', f.category); plain('City', f.city); plain('Notes', f.notes);
    plain('Contact', f.contact_name); emailRow('Email', f.email); phoneRow('Phone', f.phone);
  } else if (f.tier === 'snf') {
    plain('Address', [f.address, f.city, 'TX', f.zip].filter(Boolean).join(', '));
    plain('County', f.county); phoneRow('Phone', f.phone);
    plain('Beds (Certified)', f.beds); plain('Avg Residents/Day', f.avg_residents);
    plain('Ownership Type', f.ownership); plain('Legal Name', f.legal_name);
    plain('Chain', f.chain_name); plain('Chain Size', f.chain_size);
    const sr = stars(f.overall_rating); if (sr) row('CMS Overall Rating', sr);
    const hr = stars(f.health_rating); if (hr) row('Health Inspection', hr);
    const qm = stars(f.qm_rating); if (qm) row('Quality Measures', qm);
    const st = stars(f.staffing_rating); if (st) row('Staffing', st);
    plain('CCN', f.ccn); plain('Special Focus', f.special_focus); plain('Abuse Icon', f.abuse_icon);
    urlRow('Source', f.source_url); plain('Notes', f.notes);
  } else if (f.tier === 'il') {
    plain('Address', [f.address, f.city, 'TX', f.zip].filter(Boolean).join(', '));
    plain('County', f.county); phoneRow('Phone', f.phone);
    plain('Approx Units', f.units); plain('Operator/Owner', f.operator);
    plain('Approx Monthly Cost', f.monthly_cost);
    urlRow('Source', f.source_url); plain('Notes', f.notes);
  }
  return `${header}${meta}<table>${rows.join('')}</table>`;
}
const counts = {};
Object.keys(COLORS).forEach(c => counts[c] = 0);
FACILITIES.forEach(f => {
  if (typeof f.lat !== 'number' || typeof f.lon !== 'number') return;
  const cat = f.color_cat || 'type_a';
  const m = L.marker([f.lat, f.lon], { icon: makeIcon(cat) });
  let tipText = f.name;
  if (f.tier === 1 && f.capacity) tipText += ' (cap ' + f.capacity + ')';
  if (f.tier === 'snf' && f.beds) tipText += ' (' + f.beds + ' beds)';
  if (f.tier === 'il' && f.units) tipText += ' (' + f.units + ' units)';
  if (f.city) tipText += ' — ' + f.city;
  m.bindTooltip(tipText, { className: 'facility-tip', direction: 'top', offset: [0,-8] });
  m.bindPopup(buildPopup(f), { maxWidth: 360 });
  m._facility = f;
  m._lname = (f.name || '').toLowerCase();
  (clusters[cat] || clusters.type_a).addLayer(m);
  allMarkers.push(m);
  counts[cat] = (counts[cat] || 0) + 1;
});
Object.keys(clusters).forEach(c => clusters[c].addTo(map));
const overlayMaps = {};
Object.entries(COLORS).forEach(([cat, meta]) => {
  overlayMaps[`${swatchHtml(meta)} ${meta.label} (${counts[cat] || 0})`] = clusters[cat];
});
L.control.layers(null, overlayMaps, { collapsed: false, position: 'topright' }).addTo(map);
const layersDiv = document.getElementById('layers');
const legendDiv = document.getElementById('legend');
const countsDiv = document.getElementById('counts');
const groups = {};
Object.entries(COLORS).forEach(([cat, meta]) => { (groups[meta.group] ||= []).push([cat, meta]); });
Object.entries(groups).forEach(([groupName, items]) => {
  const h3 = document.createElement('h3');
  h3.textContent = groupName;
  layersDiv.appendChild(h3);
  const groupRow = document.createElement('div');
  groupRow.className = 'group-toggle';
  groupRow.innerHTML = `<button data-group="${escapeHtml(groupName)}" data-action="all">All</button> <button data-group="${escapeHtml(groupName)}" data-action="none">None</button>`;
  layersDiv.appendChild(groupRow);
  items.forEach(([cat, meta]) => {
    const row = document.createElement('div');
    row.className = 'layer-row';
    row.dataset.group = groupName;
    row.innerHTML = `<input type="checkbox" id="lyr-${cat}" data-cat="${cat}" checked> ${swatchHtml(meta)} <label for="lyr-${cat}">${meta.label} <span style="color:#9ca3af">(${counts[cat] || 0})</span></label>`;
    layersDiv.appendChild(row);
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) clusters[cat].addTo(map); else map.removeLayer(clusters[cat]);
      updateCounts();
    });
  });
});
layersDiv.addEventListener('click', e => {
  const btn = e.target.closest('button[data-group]');
  if (!btn) return;
  const g = btn.dataset.group; const action = btn.dataset.action;
  layersDiv.querySelectorAll(`.layer-row[data-group="${CSS.escape(g)}"] input`).forEach(cb => {
    cb.checked = (action === 'all'); cb.dispatchEvent(new Event('change'));
  });
});
Object.entries(COLORS).forEach(([cat, meta]) => {
  const lg = document.createElement('div');
  lg.className = 'legend-row';
  lg.innerHTML = `${swatchHtml(meta)}<span>${meta.label}</span>`;
  legendDiv.appendChild(lg);
});
document.getElementById('toggle-sidebar').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(() => map.invalidateSize(), 220);
});
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  Object.keys(clusters).forEach(cat => clusters[cat].clearLayers());
  allMarkers.forEach(m => {
    if (!q || m._lname.includes(q)) {
      const cat = m._facility.color_cat || 'type_a';
      const cb = document.getElementById(`lyr-${cat}`);
      if (cb && cb.checked) clusters[cat].addLayer(m);
    }
  });
  updateCounts(q);
});
function updateCounts(q) {
  let total = 0; let visible = 0;
  Object.keys(clusters).forEach(cat => {
    const cb = document.getElementById(`lyr-${cat}`);
    const c = clusters[cat].getLayers().length;
    if (cb && cb.checked) visible += c;
    total += counts[cat];
  });
  countsDiv.innerHTML = `<strong>${visible}</strong> visible / <strong>${total}</strong> total facilities${q ? ` <br><span style="color:#9ca3af">filter: "${escapeHtml(q)}"</span>` : ''}`;
}
const t = SUMMARY.totals; const f = SUMMARY.failed;
document.getElementById('totals').textContent = `${SUMMARY.mapped} mapped (${t.t1} AL, ${t.t2} T2, ${t.snf} SNF, ${t.il} IL; ${f.t1+f.t2+f.snf+f.il} unmapped)`;
updateCounts();
if (window.innerWidth < 720) document.getElementById('sidebar').classList.add('collapsed');
</script>
</body>
</html>
